name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: linux-amd64
            os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
          - target: linux-arm64
            os: ubuntu-latest
            rust_target: aarch64-unknown-linux-gnu
            cross: true
          - target: macos-amd64
            os: macos-latest
            rust_target: x86_64-apple-darwin
          - target: macos-arm64
            os: macos-latest
            rust_target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Clone arbiter-mcp-firewall (path dependency)
        run: git clone https://github.com/cyrenei/arbiter-mcp-firewall.git arbiter-mcp-firewall

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install cross-compilation tools (ARM64 Linux)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.rust_target }}

      - name: Strip binary (Linux)
        if: contains(matrix.target, 'linux') && !matrix.cross
        run: strip target/${{ matrix.rust_target }}/release/containment

      - name: Strip binary (Linux ARM64 cross)
        if: matrix.cross
        run: aarch64-linux-gnu-strip target/${{ matrix.rust_target }}/release/containment

      - name: Strip binary (macOS)
        if: contains(matrix.target, 'macos')
        run: strip target/${{ matrix.rust_target }}/release/containment

      - name: Package
        run: |
          mkdir -p dist/containment-${{ matrix.target }}
          cp target/${{ matrix.rust_target }}/release/containment dist/containment-${{ matrix.target }}/
          cp LICENSE README.md dist/containment-${{ matrix.target }}/
          cd dist && tar czf containment-${{ matrix.target }}.tar.gz containment-${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: containment-${{ matrix.target }}
          path: dist/containment-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum containment-*.tar.gz > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/containment-*.tar.gz
            artifacts/checksums-sha256.txt
